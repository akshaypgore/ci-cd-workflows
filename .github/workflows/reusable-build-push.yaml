name: Reusable - Build and Push Docker Image

on:
  workflow_call:
    # secrets:
    #   DOCKERHUB_USERNAME:
    #     required: true
    #   DOCKERHUB_TOKEN:
    #     required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
  
    steps:
      - run: |
          echo "Branch Name: ${{ github.ref_name }}"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}  # always pulls latest commit on the branch

      - name: Derive image name from repository
        id: image-name
        run: |
          IMAGE_NAME="${{ github.repository }}"
          IMAGE_NAME="${IMAGE_NAME##*/}"
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "Image name: $IMAGE_NAME"

      - name: Read version from version.txt
        id: read-version
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Read version: $VERSION"

      - name: Construct image tag
        id: construct-tag
        run: |
          VERSION="${{ steps.read-version.outputs.VERSION }}"
          IMAGE="${{ steps.image-name.outputs.IMAGE_NAME }}"
          COMMIT_ID="${{ github.sha }}"
          SHORT_COMMIT="${COMMIT_ID::7}"
          BRANCH="${{ github.ref_name }}"
          CLEAN_BRANCH=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9._-]/-/g')

          # Detect suffix from version.txt and construct tags accordingly
          if [[ "$VERSION" == *"-SNAPSHOT"* ]]; then
            # feature/* or hotfix/* - include branch name in tag
            SPECIFIC_TAG="$IMAGE:$VERSION-$CLEAN_BRANCH-$SHORT_COMMIT"
            FLOATING_TAG="$IMAGE:$VERSION-$CLEAN_BRANCH-latest"

          elif [[ "$VERSION" == *"-DEV"* ]]; then
            # develop branch
            SPECIFIC_TAG="$IMAGE:$VERSION-$SHORT_COMMIT"
            FLOATING_TAG="$IMAGE:$VERSION-latest"

          elif [[ "$VERSION" == *"-RC"* ]]; then
            # release/* branch
            SPECIFIC_TAG="$IMAGE:$VERSION-$SHORT_COMMIT"
            FLOATING_TAG="$IMAGE:$VERSION-latest"

          else
            # master - no suffix, clean version tag
            SPECIFIC_TAG="$IMAGE:$VERSION"
            FLOATING_TAG="$IMAGE:latest"
          fi

          echo "SPECIFIC_TAG=$SPECIFIC_TAG" >> $GITHUB_OUTPUT
          echo "FLOATING_TAG=$FLOATING_TAG" >> $GITHUB_OUTPUT
          echo "Specific tag: $SPECIFIC_TAG"
          echo "Floating tag: $FLOATING_TAG"

      # - name: Log in to Docker registry
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.REGISTRY_USERNAME }}
      #     password: ${{ secrets.REGISTRY_PASSWORD }}

      # - name: Build Docker image
      #   run: |
      #     docker build \
      #       -t ${{ steps.construct-tag.outputs.SPECIFIC_TAG }} \
      #       -t ${{ steps.construct-tag.outputs.FLOATING_TAG }} \
      #       .

      # - name: Push Docker image
      #   run: |
      #     docker push ${{ steps.construct-tag.outputs.SPECIFIC_TAG }}
      #     docker push ${{ steps.construct-tag.outputs.FLOATING_TAG }}

      - name: Summary
        run: |
          echo "### Docker Image Published" >> $GITHUB_STEP_SUMMARY
          echo "- Image name: \`${{ steps.image-name.outputs.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Specific tag: \`${{ steps.construct-tag.outputs.SPECIFIC_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Floating tag: \`${{ steps.construct-tag.outputs.FLOATING_TAG }}\`" >> $GITHUB_STEP_SUMMARY


